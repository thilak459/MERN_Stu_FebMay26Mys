<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="p-6 rounded-xl shadow m-6 max-w-md">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold">Notification center</h2>
            <span class="inline-flex  px-4 py-2 rounded shadow bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm">3 New</span>

        </div>
        <div class="bg-red-100 border-l-4 border-red-400 p-4 rounded mb-3">
            <p class="font-semibold text-red-700">Action Required</p>
            <p class="text-sm text-red-600 text-light">Your last payment attempt failed. Please update your payment method to avoid service interruption.</p>

        </div>
        <div class="bg-yellow-100 border-l-4 border-yellow-500 p-4 rounded mb-3">
            <p class="font-semibold text-yellow-700">Maintenance Notice</p>
            <p class="text-sm text-yellow-600 text-light">Your last payment attempt failed. Please update your payment method to avoid service interruption.</p>

        </div>
        <div class="flex gap-3">
            <button class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded shadow">View All</button>
            <button class="bg-white-500 hover:bg-gray-100 text-grey-700 px-4 py-2 rounded shadow">Dismiss</button>
        </div>

    </div>
</body>
</html>
