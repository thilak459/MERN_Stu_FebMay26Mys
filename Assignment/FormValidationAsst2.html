<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
</head>
<body>
    <form>
        <h2>Feedback Form</h2>
        <input type="text" id="name" placeholder="Enter name" required><br><br>
        <input type="text" id="email" placeholder="Enter email"><br><br>
        <select id="type">
            <option value="">Select Feedback Type</option>
            <option value="bug">Bug</option>
            <option value="suggestion">Suggestion</option>
            <option value="appreciation">Appreciation</option>
        </select><br><br>
        <textarea id="text" placeholder="Enter feedback"></textarea><br><br>
        <button id="addBtn">Submit</button>
        <button id="deleteBtn">Delete</button>
        <h4>Total Feedback : <span id="count">0</span></h4>
        <div id="feedbackData"></div>
    </form>
    <p id="message"></p>
    <script src="./A3.js"></script>
</body>
</html>
