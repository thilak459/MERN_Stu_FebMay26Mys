<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning elements: relative</title>
    <style>
        .house{
            padding-left: 260px;
        }
        .box{
            position: relative;
            top: 150px;
            left: 350px;
            width: 150px;
            height: 150px;
            border: 2px solid black;
            background-color:greenyellow;
            margin: 10px;
            color: red;
        }
        .box2{
            position: relative;
            bottom: 35px;
            left: 300px;
            width: 250px;
            height: 25px;
            border: 2px solid black;
            background-color: orange;
            margin: 10px;
            color: red;
        }
        .box3{
            position: relative;
            top: 22px;
            left: 410px;
            width: 35px;
            height: 70px;
            border: 2px solid black;
            background-color: blue;
            margin: 10px;
            color: red;
        }
        .box4{
            position: relative;
            bottom: 100px;
            left: 370px;
            width: 20px;
            height: 35px;
            border: 2px solid black;
            background-color: yellow;
            margin: 10px;
            color: red;
        }
        .box5{
            position: relative;
            bottom: 140px;
            left: 466px;
            width:20px;
            height: 30px;
            border: 2px solid black;
            background-color: purple;
            margin: 10px;
            color: red;
        }
        body{
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <h2>Relative position</h2>
    <div class="house">
    <div class="box"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box5"></div></div>
</body>
</html>
