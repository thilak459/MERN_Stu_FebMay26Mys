<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Objects, arrays</title>
    
</head>
<body>
    <pre id="out">
    </pre>
     <button id="runBtn" class="px-3 py-1 rounded mt-2 mb-2 bg-black text-white">
        Run
    </button>
    <script>
        const out = document.getElementById("out");
        function print(...args){
            //Console
            console.log(...args);
            out.textContent+=args.join("")+"\n";
        }
        
       function clearOut(){
        out.textContent += "";
       }
       function run(){
            clearOut();
            const user = {name:"Vishnu",age:23};
            print("User = ",JSON.stringify(user));

            const arr = [1,2,3];
            arr.push(5); 
            print("Is it an array:?",Array.isArray(arr));
        }
        document.getElementById("runBtn").addEventListener("click",run);
    </script>
</body>
</html>
